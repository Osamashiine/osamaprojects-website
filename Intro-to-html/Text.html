<!DOCTYPE html>
<html>
<head>
	<title>Text editing</title>
<style>
	p {
		font-family: Arial;
		margin-top: 0px;
		margin-bottom: 0px;
	}
	.video-title{ 
		font-weight: bold;
		font-size: 18px;
		width: 284px;
		line-height: 25px;
		margin-bottom: 5px;
	}
	.vidio-stats{
	font-size: 14px;
	color:rgb(96, 96, 96 );	
	margin-top:0px;
	margin-bottom: 20px;

	}
	.vidio-arthur{
		font-size: 14px;
		color:rgb(96, 96, 96);
		margin-top: 0px;
		margin-bottom: 18px;
	}
	.vidio-des{
		font-size: 14px;
		color:rgb(96, 96, 96);
		line-height: 20px;
		margin-top: 14px;
		width: 284px;
		margin-bottom: 100px;
	}
	.apple-text{
		font-size: 14px;
		background-color: rgb(227,65,64);
		color:white;
		text-align: center;
		padding-top: 18px;
		padding-bottom: 18px;
	}
	.shop:hover{
		cursor: pointer;
		text-decoration: underline;
	}
</style>
</head>
<body>
<p class="video-title">
Talking Tech and AI with Google CEO Sundar Pichai!
</p>
<p class="vidio-stats">
3.4M views &#183; 6 months ago
</p>
<p class="vidio-arthur">
Marques Brownlee &#10003; 
</p>
<p class="vidio-des">
Talking tech and AI on the heels of Google I/O. Also a daily driver phone reveal from Google's CEO. Shoutout to Sundar!
</p>
<p style="margin-bottom: 20px;" class="apple-text">
Shop early for the best selection of holiday favourites. <span class="shop">Shop now &#62; 
</span> 
</p>

</body>
</html>
