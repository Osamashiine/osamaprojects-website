<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Position practice</title>
</head>
<body style="height: 3000px;
width: 3000px;
padding-top: 70px;
padding-left: 80px;">
<div style="background-color: black;
color:white;
position: fixed;
top: 0px;
height: 50px;
left: 0px;
right: 0px;
z-index: 1;
">
	Header
</div>	
<div style="background-color: blue;
color: white;
position: fixed;
top: 50px;
bottom: 0;
left: 0;
width: 72px;">
	
	sidebar

<div style="position: absolute;
background-color: red;
color: white;
top: 0px;
right: 0;">

	X
</div>
</div>

<div style="position: absolute;
background-color: green;
color: white;
top: 60px;">

	Absolute
</div>

<div style="
background-color: lightblue;
height: 200px;
width: 200px;
position: static;">div1</div>

<div style="
background-color: lightpink;
height: 200px;
width: 200px;
position: relative;">div2
<div style="position: absolute;
background-color: black;
color: white;
bottom: 10px;
right: 10px;">

	5:00
</div>
</div>
</body>
</html>
