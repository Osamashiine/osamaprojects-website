<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Grid practice</title>
</head>
<body style="padding-bottom: 1000px;">
<div style="
display: grid;
grid-template-columns: 100px 150px;
">
	<div style="background-color: pink;">div 1</div>
	<div style="background-color:cadetblue;">div 2 <p>paragraph</p></div>
</div>

<div style="
	margin-top: 20px;
	display: grid;
	grid-template-columns: 100px 150px 1fr;
	">
		<div style="background-color: pink;">div 1</div>
		<div style="background-color:cadetblue;">div 2 <p>text</p></div>
		<div style="background-color: pink;">div 3</div>
</div>
<div style="
	margin-top: 20px;
	display: grid;
	grid-template-columns: 100px 1fr;
	">
		<div style="background-color: pink;">100px</div>
		<div style="background-color:cadetblue;">free space
		</div>
</div>
<div style="
	margin-top: 20px;
	display: grid;
	grid-template-columns: 100px 1fr 1fr;
	">
		<div style="background-color: pink;">100px</div>
		<div style="background-color:cadetblue;">free space
		</div>
		<div style="background-color: pink;">fr</div>
</div>

<div style="
	margin-top: 20px;
	display: grid;
	grid-template-columns: 1fr 1fr 1fr;
	column-gap: 20px;
	row-gap: 40px;
	">
		<div style="background-color: pink; height: 200px;">1fr</div>
		<div style="background-color:cadetblue; height: 200px;">1fr
		</div>
		<div style="background-color: pink; height: 200px;">1fr</div>
		<div style="background-color:cadetblue; height: 200px;">1fr
		</div>
		<div style="background-color: pink; height: 200px;">1fr</div>
		<div style="background-color:cadetblue; height: 200px;">1fr
		</div>
</div>
<div style="
display: grid;
grid-template-columns: 206px ;
">
	<div style="background-color: pink;">div 1</div>
</div>

</body>
</body>
</html>
