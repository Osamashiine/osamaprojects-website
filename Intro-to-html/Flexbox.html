<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Flex-box parctice</title>
</head>
<body style="padding-bottom:1000px;">
<div style="
	display: flex;
	flex-direction: row;">
	<div style="background-color:lightblue;">div 1 <p>text</p></div>
	<div style="background-color:lightpink;">div 2</div>
</div>
<div style="
	margin-top: 30px;
	display: flex;
	flex-direction: row;">
	<div style="background-color:lightblue;
	width: 100px;">100px</div>
	<div style="background-color:lightpink;
	flex: 1;">flex </div>
</div>
<div style="
	margin-top: 30px;
	display: flex;
	flex-direction: row;">
	<div style="background-color:lightblue;
	flex: 1;">flex </div>
	<div style="background-color:lightpink;
	width: 100px;">100px</div>
	<div style="background-color:lightblue;
	flex: 2 ;">flex 2</div>
</div>
<div style="
	height: 70px;
	border-width: 1px;
	border-style: solid;
	border-color: gray;
	margin-top: 30px;
	justify-content: center;

	display: flex;
	flex-direction: row;">
	<div style="background-color:lightblue;
	width: 100px;">100px</div>
	<div style="background-color:lightpink;
	width: 100px;">100px</div>
	<div style="background-color:lightblue;
	width: 100px;">100px</div>
</div>

<div style="
	height: 70px;
	border-width: 1px;
	border-style: solid;
	border-color: gray;
	margin-top: 30px;
	justify-content: space-between;

	display: flex;
	flex-direction: row;">
	<div style="background-color:lightblue;
	width: 100px;">100px</div>
	<div style="background-color:lightpink;
	width: 100px;">100px</div>
	<div style="background-color:lightblue;
	width: 100px;">100px</div>
</div>

<div style="
	height: 70px;
	border-width: 1px;
	border-style: solid;
	border-color: gray;
	margin-top: 30px;
	justify-content: space-between;
	align-items: center;

	display: flex;
	flex-direction: row;">
	<div style="background-color:lightblue;
	width: 100px;">100px</div>
	<div style="background-color:lightpink;
	width: 100px;">100px</div>
	<div style="background-color:lightblue;
	width: 100px;">100px</div>
</div>
</body>
</html>
